<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Legal Assistant</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Marked.js for Markdown Rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Loading Animation Dots */
        .loading::after {
            content: '...';
            animation: dots 1.5s steps(5, end) infinite;
            display: inline-block;
            width: 1em;
            text-align: left;
        }
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        /* Markdown Styles for Legal Text */
        .prose h3 { font-size: 1.1em; font-weight: 700; margin-top: 1em; margin-bottom: 0.5em; color: #1e293b; }
        .prose ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1em; }
        .prose ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 1em; }
        .prose li { margin-bottom: 0.25em; }
        .prose strong { color: #0f172a; font-weight: 600; }
        .prose p { margin-bottom: 0.75em; line-height: 1.6; }
    </style>
</head>
<body class="bg-gray-100 font-sans flex items-center justify-center min-h-screen">
    
    <!-- Main Chat Container -->
    <div class="chat-container w-full max-w-2xl bg-white rounded-xl shadow-2xl flex flex-col h-[85vh] overflow-hidden border border-gray-200">
        
        <!-- Header -->
        <header class="bg-slate-800 text-white p-4 text-center shadow-md z-10">
            <h1 class="text-xl font-bold tracking-wide">⚖️ AI Legal Assistant</h1>
            <p class="text-xs text-slate-300 mt-1">Powered by RAG & Groq LLM</p>
        </header>

        <!-- Chat Window -->
        <main id="chat-window" class="flex-1 p-4 overflow-y-auto bg-slate-50 space-y-4">
             <!-- Initial Bot Message -->
             <div class="message flex items-start">
                 <div class="flex-shrink-0 h-8 w-8 rounded-full bg-blue-600 text-white flex items-center justify-center mr-3 font-bold text-xs shadow-sm">AI</div>
                 <div class="bg-white border border-gray-200 text-gray-800 p-4 rounded-2xl rounded-tl-none shadow-sm max-w-[85%] text-sm">
                     <p>
                        Hello! I am your Legal AI. 
                        <br><br>
                        I can analyze the <strong>Indian Penal Code</strong> documents in my database, or you can attach a specific <code>.txt</code> file for me to review.
                        <br><br>
                        <span class="text-xs text-gray-500 font-semibold italic">⚠️ Disclaimer: I am an AI, not a lawyer. This is for informational purposes only.</span>
                    </p>
                 </div>
             </div>
        </main>

        <!-- Input Area -->
        <footer class="p-4 bg-white border-t border-gray-200">
             
             <!-- File Preview Area -->
             <div id="preview-container" class="hidden mb-3 p-2 bg-blue-50 border border-blue-100 rounded-lg flex justify-between items-center animate-pulse">
                 <div class="flex items-center text-blue-700">
                     <span class="text-xl mr-2">📄</span>
                     <span id="file-name" class="text-sm font-medium truncate max-w-[200px]"></span>
                 </div>
                 <button id="remove-file-btn" class="text-blue-400 hover:text-red-500 transition-colors">
                    <svg xmlns="http://www.w.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                    </svg>
                 </button>
             </div>

            <!-- Chat Form -->
            <form id="chat-form" class="flex items-center gap-2">
                
                <!-- Hidden File Input -->
                <input type="file" id="file-input" class="hidden" accept=".txt">
                
                <!-- Attach Button -->
                <button type="button" id="attach-file-btn" class="text-gray-400 hover:text-blue-600 p-2 rounded-full transition-colors hover:bg-blue-50" title="Attach .txt file">
                     <svg xmlns="http://www.w.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
                     </svg>
                </button>

                <!-- Text Input -->
                <div class="relative flex-1">
                    <input type="text" id="message-input" class="w-full bg-gray-100 text-gray-800 border-none rounded-full py-3 px-5 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-gray-400 transition-all" placeholder="Ask a legal question..." autocomplete="off">
                </div>
                
                <!-- Send Button -->
                <button type="submit" id="send-button" class="bg-blue-600 text-white rounded-full p-3 hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-all shadow-md transform hover:scale-105 active:scale-95" disabled>
                     <svg xmlns="http://www.w.org/2000/svg" class="h-5 w-5 transform rotate-90 translate-x-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                     </svg>
                </button>
            </form>
        </footer>
    </div>

    <script>
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const chatWindow = document.getElementById('chat-window');
        const sendButton = document.getElementById('send-button');
        const fileInput = document.getElementById('file-input');
        const attachFileBtn = document.getElementById('attach-file-btn');
        const previewContainer = document.getElementById('preview-container');
        const fileNameEl = document.getElementById('file-name');
        const removeFileBtn = document.getElementById('remove-file-btn');

        // Toggle Send Button State
        function toggleSendButton() {
            const hasText = messageInput.value.trim() !== '';
            const hasFile = fileInput.files.length > 0;
            sendButton.disabled = !hasText && !hasFile;
        }

        messageInput.addEventListener('input', toggleSendButton);
        fileInput.addEventListener('change', toggleSendButton);
        
        // Handle File Attachment
        attachFileBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                fileNameEl.textContent = file.name;
                previewContainer.classList.remove('hidden');
                previewContainer.classList.add('flex');
            } else {
                previewContainer.classList.add('hidden');
                previewContainer.classList.remove('flex');
            }
        });

        removeFileBtn.addEventListener('click', () => {
            fileInput.value = ''; 
            previewContainer.classList.add('hidden');
            previewContainer.classList.remove('flex');
            toggleSendButton();
        });

        // Handle Chat Submission
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = messageInput.value.trim();
            const file = fileInput.files[0];

            if (!message && !file) return;

            // 1. Show User Message
            if (message) appendMessage('user', message);
            if (file) appendMessage('user', `<em>📎 Attached: ${file.name}</em>`);

            // 2. Reset UI
            messageInput.value = '';
            fileInput.value = '';
            previewContainer.classList.add('hidden');
            sendButton.disabled = true;

            // 3. Show Loading Bubble
            const loadingBubble = appendMessage('bot', '', true);
            
            // 4. Prepare Payload
            const formData = new FormData();
            formData.append('message', message);
            if (file) formData.append('file', file);

            try {
                // 5. Call Backend
                const response = await fetch('/chat', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || `Server Error: ${response.status}`);
                }

                const data = await response.json();
                
                // 6. Render Response (Markdown -> HTML)
                loadingBubble.innerHTML = marked.parse(data.response);
                loadingBubble.classList.remove('loading', 'italic', 'text-gray-500');
                // Apply styling to prose
                loadingBubble.classList.add('prose', 'prose-sm', 'max-w-none', 'text-gray-800');

            } catch (error) {
                console.error('Error:', error);
                loadingBubble.innerHTML = `<span class="text-red-600 font-semibold">⚠️ Error:</span> ${error.message}`;
                loadingBubble.classList.remove('loading');
                loadingBubble.classList.add('bg-red-50', 'border-red-200');
            }
        });

        // Helper: Create Message Bubbles
        function appendMessage(sender, text, isLoading = false) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', 'flex', 'items-start', 'mb-4', 'animate-fade-in');
            
            let avatarHTML = '';
            let contentClasses = '';
            let innerHTMLContent = '';

            if (sender === 'user') {
                messageDiv.classList.add('justify-end');
                avatarHTML = `<div class="flex-shrink-0 h-8 w-8 rounded-full bg-gray-500 text-white flex items-center justify-center ml-3 font-bold text-xs order-2 shadow-sm">ME</div>`;
                contentClasses = `bg-blue-600 text-white p-3 rounded-2xl rounded-tr-none shadow-md max-w-[80%] text-sm order-1`;
                innerHTMLContent = `<p>${text}</p>`;
            } else {
                avatarHTML = `<div class="flex-shrink-0 h-8 w-8 rounded-full bg-blue-600 text-white flex items-center justify-center mr-3 font-bold text-xs shadow-sm">AI</div>`;
                
                if (isLoading) {
                    contentClasses = `bg-gray-100 text-gray-500 italic p-4 rounded-2xl rounded-tl-none shadow-sm max-w-[85%] text-sm loading`;
                    innerHTMLContent = 'Thinking';
                } else {
                    contentClasses = `bg-white border border-gray-200 text-gray-800 p-4 rounded-2xl rounded-tl-none shadow-sm max-w-[85%] text-sm`;
                    innerHTMLContent = text;
                }
            }

            messageDiv.innerHTML = sender === 'user' ? (innerHTMLContent + avatarHTML) : (avatarHTML + `<div class="${contentClasses}">${innerHTMLContent}</div>`);
            
            if (sender === 'user') {
                // Manual fix for user message structure to handle the order
                messageDiv.innerHTML = `
                    <div class="${contentClasses}">${innerHTMLContent}</div>
                    ${avatarHTML}
                `;
            } else {
                // Bot message structure
                 messageDiv.innerHTML = `
                    ${avatarHTML}
                    <div class="${contentClasses}">${innerHTMLContent}</div>
                `;
            }

            chatWindow.appendChild(messageDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            
            // Return the content div so we can update it later (for loading state)
            return messageDiv.querySelector('div.bg-white, div.loading');
        }
    </script>
</body>
</html>
